name: CLI release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc, bin: mercurio.exe }
          - { os: macos-latest, target: aarch64-apple-darwin, bin: mercurio }
          - { os: macos-13, target: x86_64-apple-darwin, bin: mercurio }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, bin: mercurio }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --release -p mercurio-sysml-cli --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: mercurio-cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
